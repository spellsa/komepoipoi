<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>こめぽいぽい</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="src/index.css" />
  </head>
  <body>
    <div class="header-info">
      <h3>好きなコメントを入力して流せます</h3>
      <p>コメントは50文字以内です</p>
      <p>節度を守って楽しみましょう！</p>
    </div>
    <form id="chat-form" action="">
      <div class="input-row">
        <input id="chat-text" autocomplete="off" />
        <span id="char-count">0/50</span>
      </div>
      <button id="send-button">送信</button>
      <p id="error-message"></p>
    </form>

    <ul id="timeline"></ul>
    <script type="module" src="src/index.ts"></script>
  </body>
</html>
